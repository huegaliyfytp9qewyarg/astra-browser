<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Astra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #1a1b26;
      color: #c0caf5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 560px;
      padding: 20px;
      margin-top: -80px;
    }

    .logo {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #7aa2f7, #bb9af7, #f7768e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 14px;
      color: #565f89;
      margin-bottom: 32px;
    }

    .search-box {
      position: relative;
      margin-bottom: 48px;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 44px;
      background: #24253a;
      border: 1.5px solid #2f3051;
      border-radius: 28px;
      color: #c0caf5;
      font-size: 15px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .search-input::placeholder {
      color: #565f89;
    }

    .search-input:focus {
      border-color: #7aa2f7;
      box-shadow: 0 0 0 3px rgba(122, 162, 247, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #565f89;
    }

    .clock {
      font-size: 64px;
      font-weight: 200;
      color: #565f89;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .date {
      font-size: 14px;
      color: #3b3d57;
      margin-bottom: 40px;
    }

    .shortcuts {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #9aa5ce;
      padding: 12px;
      border-radius: 12px;
      transition: background 0.2s;
      width: 80px;
    }

    .shortcut:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .shortcut-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #24253a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .shortcut-label {
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 80px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>

    <div class="logo">Astra</div>
    <p class="tagline">Private search. Private browsing.</p>

    <div class="search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input class="search-input" id="search-input" type="text" placeholder="Search with Astra..." autofocus>
    </div>

    <div class="shortcuts">
      <a class="shortcut" href="astra://settings">
        <div class="shortcut-icon">&#9881;</div>
        <span class="shortcut-label">Settings</span>
      </a>
      <a class="shortcut" href="astra://history">
        <div class="shortcut-icon">&#128337;</div>
        <span class="shortcut-label">History</span>
      </a>
      <a class="shortcut" href="astra://bookmarks">
        <div class="shortcut-icon">&#9734;</div>
        <span class="shortcut-label">Bookmarks</span>
      </a>
    </div>
  </div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('date').textContent =
        now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Search
    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = e.target.value.trim();
        if (query) {
          window.location.href = 'astra://search?q=' + encodeURIComponent(query);
        }
      }
    });
  </script>
</body>
</html>
