<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Astra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
      background: #0b0b14;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 20s ease-in-out infinite;
      pointer-events: none;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #818cf8, #6366f1);
      top: -150px;
      right: -100px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #c084fc, #a855f7);
      bottom: -120px;
      left: -80px;
      animation-delay: -7s;
    }

    .bg-orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #38bdf8, #0ea5e9);
      top: 40%;
      left: 60%;
      animation-delay: -14s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -20px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(10px, 10px) scale(1.02); }
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 560px;
      padding: 20px;
      margin-top: -60px;
      position: relative;
      z-index: 1;
    }

    .greeting {
      font-size: 14px;
      color: #475569;
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .clock {
      font-size: 72px;
      font-weight: 200;
      color: #e2e8f0;
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      line-height: 1;
    }

    .date {
      font-size: 14px;
      color: #475569;
      margin-bottom: 48px;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 0 12px rgba(129, 140, 248, 0.4));
    }

    .logo {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #818cf8 0%, #a78bfa 40%, #c084fc 70%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 13px;
      color: #475569;
      margin-bottom: 28px;
      font-weight: 400;
    }

    /* Search box */
    .search-box {
      position: relative;
      margin-bottom: 48px;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      background: rgba(22, 23, 39, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      color: #e2e8f0;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    }

    .search-input::placeholder {
      color: #475569;
    }

    .search-input:focus {
      border-color: rgba(129, 140, 248, 0.4);
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.1), 0 4px 24px rgba(0, 0, 0, 0.3);
      background: rgba(22, 23, 39, 0.95);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      transition: color 0.2s;
    }

    .search-input:focus ~ .search-icon,
    .search-box:focus-within .search-icon {
      color: #818cf8;
    }

    /* Shortcuts */
    .shortcuts {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #94a3b8;
      padding: 14px 12px;
      border-radius: 14px;
      transition: background 0.2s, transform 0.2s;
      width: 82px;
    }

    .shortcut:hover {
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-2px);
    }

    .shortcut-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .shortcut:hover .shortcut-icon {
      background: rgba(129, 140, 248, 0.1);
      border-color: rgba(129, 140, 248, 0.2);
    }

    .shortcut-label {
      font-size: 11px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 80px;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="container">
    <div class="greeting" id="greeting"></div>
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>

    <div class="logo-wrap">
      <!-- Astra star SVG logo -->
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#818cf8"/>
            <stop offset="50%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#f472b6"/>
          </linearGradient>
        </defs>
        <path d="M20 2 L23.5 15 L38 20 L23.5 25 L20 38 L16.5 25 L2 20 L16.5 15 Z" fill="url(#star-grad)" opacity="0.9"/>
        <path d="M20 8 L22 16.5 L30 20 L22 23.5 L20 32 L18 23.5 L10 20 L18 16.5 Z" fill="white" opacity="0.3"/>
      </svg>
      <div class="logo">Astra</div>
    </div>
    <p class="tagline">Private search. Private browsing.</p>

    <div class="search-box">
      <input class="search-input" id="search-input" type="text" placeholder="Search with Astra..." autofocus>
      <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="shortcuts">
      <a class="shortcut" href="astra://settings">
        <div class="shortcut-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="#94a3b8" stroke-width="1.3"/>
            <path d="M16.2 12.2a1.4 1.4 0 00.28 1.54l.05.05a1.7 1.7 0 11-2.4 2.4l-.05-.05a1.4 1.4 0 00-1.54-.28 1.4 1.4 0 00-.85 1.28v.14a1.7 1.7 0 11-3.4 0v-.07a1.4 1.4 0 00-.92-1.28 1.4 1.4 0 00-1.54.28l-.05.05a1.7 1.7 0 11-2.4-2.4l.05-.05a1.4 1.4 0 00.28-1.54 1.4 1.4 0 00-1.28-.85H2.3a1.7 1.7 0 110-3.4h.07a1.4 1.4 0 001.28-.92 1.4 1.4 0 00-.28-1.54l-.05-.05a1.7 1.7 0 112.4-2.4l.05.05a1.4 1.4 0 001.54.28h.07a1.4 1.4 0 00.85-1.28V2.3a1.7 1.7 0 113.4 0v.07a1.4 1.4 0 00.85 1.28 1.4 1.4 0 001.54-.28l.05-.05a1.7 1.7 0 112.4 2.4l-.05.05a1.4 1.4 0 00-.28 1.54v.07a1.4 1.4 0 001.28.85h.14a1.7 1.7 0 110 3.4h-.07a1.4 1.4 0 00-1.28.85z" stroke="#94a3b8" stroke-width="1.3"/>
          </svg>
        </div>
        <span class="shortcut-label">Settings</span>
      </a>
      <a class="shortcut" href="astra://history">
        <div class="shortcut-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="7.5" stroke="#94a3b8" stroke-width="1.3"/>
            <path d="M10 5.5V10l3 2" stroke="#94a3b8" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="shortcut-label">History</span>
      </a>
      <a class="shortcut" href="astra://bookmarks">
        <div class="shortcut-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M5 3h10a1 1 0 011 1v13l-6-3.5L4 17V4a1 1 0 011-1z" stroke="#94a3b8" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="shortcut-label">Bookmarks</span>
      </a>
      <a class="shortcut" href="astra://settings">
        <div class="shortcut-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2.5L4 5.5v4c0 4 2.6 7.7 6 8.5 3.4-.8 6-4.5 6-8.5v-4L10 2.5z" stroke="#94a3b8" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M7.5 10l1.5 1.5L12.5 8" stroke="#94a3b8" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="shortcut-label">Privacy</span>
      </a>
    </div>
  </div>

  <script>
    // Greeting
    function getGreeting() {
      var h = new Date().getHours();
      if (h < 12) return 'Good morning';
      if (h < 18) return 'Good afternoon';
      return 'Good evening';
    }

    // Clock
    function updateClock() {
      var now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('date').textContent =
        now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
      document.getElementById('greeting').textContent = getGreeting();
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Search
    document.getElementById('search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var query = e.target.value.trim();
        if (query) {
          window.location.href = 'astra://search?q=' + encodeURIComponent(query);
        }
      }
    });
  </script>
</body>
</html>
