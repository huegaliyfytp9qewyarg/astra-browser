<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - Astra</title>
  <link rel="stylesheet" href="astra://css/search.css">
</head>
<body>
  <div class="search-container">
    <div class="search-header">
      <a href="astra://newtab" class="search-logo">Astra</a>
      <div class="search-input-wrap">
        <input class="search-input" id="search-input" type="text" placeholder="Search with Astra..." autofocus>
      </div>
    </div>

    <div id="search-stats" class="search-stats"></div>
    <div id="search-results" class="search-results">
      <div class="search-loading">
        <div class="loading-spinner"></div>
        <p>Searching...</p>
      </div>
    </div>
  </div>

  <script>
    const resultsContainer = document.getElementById('search-results');
    const statsContainer = document.getElementById('search-stats');
    const searchInput = document.getElementById('search-input');

    const params = new URLSearchParams(window.location.search);
    const query = params.get('q') || '';
    searchInput.value = query;
    document.title = query ? query + ' - Astra Search' : 'Astra Search';

    if (!query) {
      resultsContainer.innerHTML = '<div class="no-results">Enter a search query to get started.</div>';
    }

    // Search on Enter — navigate to new search URL
    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var q = searchInput.value.trim();
        if (q) {
          window.location.href = 'astra://search?q=' + encodeURIComponent(q);
        }
      }
    });

    // Called by main process via executeJavaScript after search completes
    window.receiveSearchResults = function(jsonStr) {
      try {
        var data = JSON.parse(jsonStr);
        renderResults(data);
      } catch (err) {
        resultsContainer.innerHTML = '<div class="search-error"><p>Failed to parse search results.</p></div>';
      }
    };

    window.receiveSearchError = function(msg) {
      resultsContainer.innerHTML =
        '<div class="search-error"><p>Search error: ' + escapeHtml(msg) + '</p>' +
        '<p style="margin-top:12px"><a href="https://duckduckgo.com/?q=' + encodeURIComponent(query) +
        '" style="color:#7aa2f7">Try DuckDuckGo directly</a></p></div>';
    };

    function renderResults(data) {
      if (!data.results || data.results.length === 0) {
        statsContainer.textContent = '';
        resultsContainer.innerHTML = '<div class="no-results">No results found. Try a different search.</div>';
        return;
      }

      statsContainer.textContent = 'About ' + data.total + ' results';

      var html = '';
      for (var i = 0; i < data.results.length; i++) {
        var r = data.results[i];
        html += '<div class="result-item">';
        html += '<div class="result-url">' + escapeHtml(r.url) + '</div>';
        html += '<a class="result-title" href="' + escapeHtml(r.url) + '">' + escapeHtml(r.title) + '</a>';
        html += '<div class="result-description">' + escapeHtml(r.description) + '</div>';
        if (r.sources && r.sources.length) {
          html += '<div class="result-sources">';
          for (var j = 0; j < r.sources.length; j++) {
            html += '<span class="source-badge">' + escapeHtml(r.sources[j]) + '</span>';
          }
          html += '</div>';
        }
        html += '</div>';
      }
      resultsContainer.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
