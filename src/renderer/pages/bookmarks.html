<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookmarks - Astra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
      background: #0b0b14;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px;
    }
    .container { max-width: 720px; margin: 0 auto; }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: #475569; margin-bottom: 24px; font-size: 14px; }

    .search-bar {
      width: 100%;
      padding: 10px 16px;
      background: rgba(22, 23, 39, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 24px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar:focus {
      border-color: rgba(129, 140, 248, 0.4);
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .bookmark-item:hover { background: rgba(255, 255, 255, 0.03); }

    .bookmark-favicon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .bookmark-info { flex: 1; overflow: hidden; }
    .bookmark-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bookmark-url {
      font-size: 11px;
      color: #475569;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #475569;
    }
    .empty svg { margin-bottom: 16px; opacity: 0.3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bookmarks</h1>
    <p class="subtitle">Your saved bookmarks (stored locally only)</p>
    <input class="search-bar" type="text" placeholder="Search bookmarks...">
    <div id="bookmarks-list">
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <path d="M14 8h20a2 2 0 012 2v30l-12-7-12 7V10a2 2 0 012-2z" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <p>Your bookmarks will appear here.<br>Press Ctrl+D to bookmark a page.</p>
      </div>
    </div>
  </div>
</body>
</html>
