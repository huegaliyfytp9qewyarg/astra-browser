<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>History - Astra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
      background: #0b0b14;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px;
    }
    .container { max-width: 720px; margin: 0 auto; }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: #475569; margin-bottom: 24px; font-size: 14px; }

    .top-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
    }
    .search-bar {
      flex: 1;
      padding: 10px 16px;
      background: rgba(22, 23, 39, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar:focus {
      border-color: rgba(129, 140, 248, 0.4);
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
    }
    .clear-btn {
      background: transparent;
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.3);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .clear-btn:hover { background: rgba(248, 113, 113, 0.1); }

    .date-group { margin-bottom: 24px; }
    .date-header {
      font-size: 12px;
      font-weight: 600;
      color: #818cf8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .history-item:hover { background: rgba(255, 255, 255, 0.03); }

    .history-favicon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .history-info { flex: 1; overflow: hidden; }
    .history-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-url {
      font-size: 11px;
      color: #475569;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-time {
      font-size: 11px;
      color: #475569;
      flex-shrink: 0;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #475569;
    }
    .empty svg { margin-bottom: 16px; opacity: 0.3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>History</h1>
    <p class="subtitle">Your browsing history (stored locally only)</p>
    <div class="top-bar">
      <input class="search-bar" type="text" placeholder="Search history...">
      <button class="clear-btn">Clear All</button>
    </div>
    <div id="history-list">
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="18" stroke="#475569" stroke-width="2"/>
          <path d="M24 14v10l6 4" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>Your browsing history will appear here.</p>
      </div>
    </div>
  </div>
</body>
</html>
