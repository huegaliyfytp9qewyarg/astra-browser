<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/chrome.css">
  <link rel="stylesheet" href="css/themes.css">
  <title>Astra Chrome</title>
</head>
<body class="theme-dark">
  <!-- Title bar / drag region -->
  <div id="tab-bar">
    <div id="tabs-container"></div>
    <button id="new-tab-btn" title="New Tab (Ctrl+T)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="drag-spacer"></div>
    <div id="window-controls">
      <button id="min-btn" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6h8" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button id="max-btn" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
      <button id="close-btn" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <div id="toolbar">
    <button id="back-btn" class="nav-btn" disabled title="Back (Alt+Left)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="forward-btn" class="nav-btn" disabled title="Forward (Alt+Right)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="reload-btn" class="nav-btn" title="Reload (Ctrl+R)">
      <svg id="reload-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 8a6 6 0 1 1 1.5 3.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M2 12V9h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg id="stop-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none">
        <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>

    <div id="address-bar-container">
      <span id="security-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1L2 3.5v3c0 3.04 2.13 5.88 5 6.5 2.87-.62 5-3.46 5-6.5v-3L7 1z" stroke="currentColor" stroke-width="1.2" fill="none"/>
        </svg>
      </span>
      <input id="address-bar" type="text" placeholder="Search with Astra or enter URL" spellcheck="false" autocomplete="off">
    </div>

    <button id="shield-btn" class="nav-btn" title="Privacy Shield">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5L2.5 4v3.5c0 3.3 2.35 6.38 5.5 7 3.15-.62 5.5-3.7 5.5-7V4L8 1.5z" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <path d="M6 8l1.5 1.5L10 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="shield-count" class="badge hidden">0</span>
    </button>
  </div>

  <script src="js/chrome.js"></script>
  <script src="js/toolbar.js"></script>
</body>
</html>
