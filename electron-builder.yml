appId: com.astra.browser
productName: Astra
copyright: Copyright 2026

directories:
  output: dist
  buildResources: assets

files:
  - src/**/*
  - filter-lists/**/*
  - node_modules/**/*
  - package.json

asar: true
asarUnpack:
  - "**/sql.js/dist/**"
compression: maximum

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip

win:
  sign: false
  icon: assets/icon.ico
  requestedExecutionLevel: asInvoker
  verifyUpdateCodeSignature: false
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Astra
  runAfterFinish: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerSidebar: null
  license: null
  include: assets/installer.nsh

fileAssociations:
  - ext: html
    name: HTML Document
    role: Viewer
  - ext: htm
    name: HTM Document
    role: Viewer
  - ext: xhtml
    name: XHTML Document
    role: Viewer

protocols:
  - name: HTTP
    schemes:
      - http
  - name: HTTPS
    schemes:
      - https

linux:
  category: Network
  target:
    - AppImage
    - deb

publish:
  provider: github
  owner: huegaliyfytp9qewyarg
  repo: astra-browser
