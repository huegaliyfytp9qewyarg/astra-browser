appId: com.astra.browser
productName: Astra
copyright: Copyright 2026

directories:
  output: dist
  buildResources: assets

files:
  - src/**/*
  - filter-lists/**/*
  - node_modules/**/*
  - package.json

asar: true
asarUnpack:
  - "**/sql.js/dist/**"
compression: maximum

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip

win:
  sign: false
  icon: assets/icon.ico
  requestedExecutionLevel: asInvoker
  verifyUpdateCodeSignature: false
  target:
    - nsis

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Astra
  runAfterFinish: true

linux:
  category: Network
  target:
    - AppImage
    - deb

publish:
  provider: github
  owner: huegaliyfytp9qewyarg
  repo: astra-browser
